<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2563eb" />
    <title>PhishRakshak Offline</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #eef2ff 0%, #f8fafc 48%, #ecfeff 100%);
        color: #0f172a;
      }
      .card {
        width: min(520px, 100%);
        background: rgba(255, 255, 255, 0.96);
        border: 1px solid #e2e8f0;
        border-radius: 28px;
        padding: 32px;
        text-align: center;
        box-shadow: 0 25px 60px rgba(15, 23, 42, 0.12);
      }
      .icon {
        width: 74px;
        height: 74px;
        border-radius: 24px;
        display: inline-grid;
        place-items: center;
        color: #fff;
        background: linear-gradient(135deg, #2563eb, #4f46e5);
        font-weight: 900;
        letter-spacing: 1px;
        margin-bottom: 18px;
      }
      h1 { margin: 0 0 10px; font-size: 30px; }
      p { margin: 0; color: #475569; line-height: 1.7; font-weight: 600; }
      a {
        display: inline-flex;
        margin-top: 22px;
        padding: 12px 18px;
        border-radius: 999px;
        background: #2563eb;
        color: #fff;
        text-decoration: none;
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="icon">DPS</div>
      <h1>You are offline</h1>
      <p>
        PhishRakshak app shell is available, but login, scan and history need internet because the Laravel API runs online/local server.
      </p>
      <a href="/">Open App</a>
    </main>
  </body>
</html>
